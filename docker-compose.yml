version: '3.8'

services:
  backend:
    build:
      context: .
    container_name: fastapi-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - vibe_network

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_studio
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    environment:
      - N8N_SECURE_COOKIE=false
    networks:
      - vibe_network

volumes:
  n8n_data:

networks:
  vibe_network:
    driver: bridge