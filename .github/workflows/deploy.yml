name: Deploy to Droplet
on:
  push:
    branches: [ master ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.DROPLET_HOST }}
        username: root
        key: ${{ secrets.DROPLET_SSH_KEY }}
        script: |
          if [ ! -d "/root/VibeClone/.git" ]; then
            rm -rf /root/VibeClone/*
            git clone https://github.com/AlimAlirzayev/VibeClone-AI---S-sli-Marketinq-Asistenti-API.git /root/VibeClone
          fi
          cd /root/VibeClone
          git pull origin master
          docker compose up -d --build
          docker image prune -f